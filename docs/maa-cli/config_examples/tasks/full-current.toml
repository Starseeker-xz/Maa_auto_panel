"$schema" = "../../schemas/task.schema.json"

# Reference task file for the currently documented maa-cli custom task wrapper
# plus MaaCore task params from docs/maa-upstream/zh-cn/protocol/integration.md.
# This is intentionally broad and is not a recommended daily run.
# Deprecated integration values are omitted. For example Roguelike mode = 2 is
# deprecated and ParadoxCopilot is not present in the current maa-cli task enum.

