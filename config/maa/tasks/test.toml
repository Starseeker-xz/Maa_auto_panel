"$schema" = "../../../docs/maa-cli/schemas/task.schema.json"

[[tasks]]
name = "启动 B 服"
type = "StartUp"
params = { client_type = "Bilibili", start_game_enabled = true }
[tasks.linux_maa]
id = "startup"

[[tasks]]
name = "领取奖励"
type = "Award"
[tasks.params]
award = true
mail = true
recruit = true
orundum = true
mining = true
specialaccess = true
[tasks.linux_maa]
id = "award"

[[tasks]]
name = "信用商店"
type = "Mall"
[tasks.params]
visit_friends = true
shopping = true
credit_fight = false
buy_first = ["招聘许可","固源岩","装置","赤金"]
blacklist = ["碳", "家具", "加急许可"]
[tasks.linux_maa]
id = "mall"

[[tasks]]
name = "基建换班"
type = "Infrast"
[tasks.params]
mode = 10000
facility = ["Mfg", "Trade", "Power", "Control", "Reception", "Office", "Dorm", "Processing", "Training"]
replenish = true
dorm_notstationed_enabled = true
dorm_trust_enabled = true
reception_message_board = true
reception_clue_exchange = true
reception_send_clue = true
filename = "排班.json"
plan_index = 3
[tasks.linux_maa]
id = "infrast"

[[tasks]]
name = "刷理智"
type = "Fight"
# strategy = "first"
# 这个参数需要搭配 [[tasks.variants]] 中的条件使用，这个条件在GUI中是通过一个可用关卡api获取的，你可以从文档找到，从而使GUI可以自动排除目前不开启的关卡，MaaCore本身是没有判断哪个关卡可以用的能力的
# 在这里大概是需要自己写条件的，所以我改成了不需要前置条件的 1-7
[tasks.params]
stage = "1-7"
medicine = 0
medicine_expire_days = 2
stone = 0
times = 2147483647
series = 0
server = "CN"
client_type = "Bilibili"
[tasks.linux_maa]
id = "fight"

# [[tasks.variants]]
# params = { stage = "1-7" }

[[tasks]]
name = "自动公招"
type = "Recruit"
[tasks.params]
refresh = true
select = [5, 4]
confirm = [5, 4]
preserve_tags = ["支援机械"]
extra_tags_mode = 0
times = 4
set_time = true
expedite = false
# skip_robot = false
# recruitment_time = { "3" = 540, "4" = 540, "5" = 540 }
server = "CN"
[tasks.linux_maa]
id = "recruit"
